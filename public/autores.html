<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestión de Autores - Biblioteca Escolar José Leonardo Ortiz</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="/imagenes/logocole.jpeg">
    <link rel="shortcut icon" type="image/jpeg" href="/imagenes/logocole.jpeg">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/admin.css" rel="stylesheet">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar"></div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="topbar">
            <h4>Autores</h4>
            <div class="user-badge">
                <i class="bi bi-person-circle"></i>
                <span id="nombreUsuario">Usuario</span>
            </div>
        </div>

        <div class="card-section">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="mb-0"><i class="bi bi-person-lines-fill me-2"></i>Listado de Autores</h6>
                <button class="btn btn-primary btn-sm" onclick="abrirModal()">
                    <i class="bi bi-plus-lg me-1"></i>Nuevo Autor
                </button>
            </div>

            <div class="d-flex mb-3">
                <input class="form-control me-2" type="search" id="inputBuscar" placeholder="Buscar autor...">
                <button class="btn btn-outline-primary" onclick="buscar()">Buscar</button>
            </div>

            <table class="table table-hover mb-0 table-responsive-cards">
                <thead>
                    <tr><th>Nombre</th><th width="120">Acciones</th></tr>
                </thead>
                <tbody id="tablaAutores">
                    <tr><td colspan="2" class="text-center text-muted">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal fade" id="modalAutor" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="modalTitulo">Nuevo Autor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="modalError" class="alert alert-danger d-none"></div>
                    <form id="formAutor">
                        <input type="hidden" id="inputId" value="">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre</label>
                            <input type="text" id="inputNombre" class="form-control" required>
                        </div>
                        <div class="d-flex gap-2 justify-content-end">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary" id="btnGuardar">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/modals.js"></script>
    <script>
        const API_URL = '/api';
        const modal = new bootstrap.Modal(document.getElementById('modalAutor'));
        let autores = [];

        document.addEventListener('DOMContentLoaded', () => {
            cargarAutores();
        });

        async function cargarAutores(busqueda = '') {
            try {
                const url = busqueda ? `${API_URL}/autores?buscar=${encodeURIComponent(busqueda)}` : `${API_URL}/autores`;
                const response = await fetchAuth(url);
                if (!response) return;
                
                autores = await response.json();
                mostrarAutores();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('tablaAutores').innerHTML = '<tr><td colspan="2" class="text-center text-danger">Error al cargar autores</td></tr>';
            }
        }

        function mostrarAutores() {
            const tbody = document.getElementById('tablaAutores');
            if (autores.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" class="text-center text-muted">No se encontraron resultados</td></tr>';
                return;
            }
            
            tbody.innerHTML = autores.map(a => `
                <tr id="fila-${a._id}">
                    <td data-label="Nombre">${escapeHtml(a.nombre)}</td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick="abrirModal('${a._id}', '${escapeHtml(a.nombre)}')">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="eliminar('${a._id}')">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function buscar() {
            const busqueda = document.getElementById('inputBuscar').value;
            cargarAutores(busqueda);
        }

        function abrirModal(id = '', nombre = '') {
            document.getElementById('modalTitulo').textContent = id ? 'Editar Autor' : 'Nuevo Autor';
            document.getElementById('inputId').value = id;
            document.getElementById('inputNombre').value = nombre;
            document.getElementById('modalError').classList.add('d-none');
            document.getElementById('btnGuardar').textContent = id ? 'Actualizar' : 'Guardar';
            modal.show();
            setTimeout(() => document.getElementById('inputNombre').focus(), 300);
        }

        document.getElementById('formAutor').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnGuardar');
            btn.disabled = true;
            
            const id = document.getElementById('inputId').value;
            const nombre = document.getElementById('inputNombre').value.trim();
            
            try {
                const url = id ? `${API_URL}/autores/${id}` : `${API_URL}/autores`;
                const method = id ? 'PUT' : 'POST';
                
                const response = await fetchAuth(url, {
                    method,
                    body: JSON.stringify({ nombre })
                });
                
                if (!response) {
                    btn.disabled = false;
                    return;
                }
                
                if (response.ok) {
                    modal.hide();
                    cargarAutores();
                } else {
                    const data = await response.json();
                    const err = document.getElementById('modalError');
                    err.textContent = data.error || 'Error al guardar';
                    err.classList.remove('d-none');
                }
            } catch (error) {
                console.error('Error:', error);
                const err = document.getElementById('modalError');
                err.textContent = 'Error al guardar';
                err.classList.remove('d-none');
            }
            
            btn.disabled = false;
        });

        async function eliminar(id) {
            if (!await confirmar('¿Eliminar este autor?', 'Confirmar eliminación')) return;
            
            try {
                const response = await fetchAuth(`${API_URL}/autores/${id}`, {
                    method: 'DELETE'
                });
                
                if (!response) return;
                
                if (response.ok) {
                    cargarAutores();
                } else {
                    const data = await response.json();
                    await alerta(data.error || 'No se puede eliminar, tiene libros asociados.', 'Error');
                }
            } catch (error) {
                console.error('Error:', error);
                await alerta('Error al eliminar', 'Error');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
