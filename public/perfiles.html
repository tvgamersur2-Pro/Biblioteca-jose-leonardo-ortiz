<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Perfiles - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/admin.css" rel="stylesheet">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar"></div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="topbar">
            <h4>Perfiles</h4>
            <div class="user-badge">
                <i class="bi bi-person-circle"></i>
                <span id="nombreUsuario">Usuario</span>
            </div>
        </div>

        <div class="card-section">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="mb-0"><i class="bi bi-shield-check me-2"></i>Perfiles del sistema</h6>
                <button class="btn btn-primary btn-sm" onclick="abrirModal()">
                    <i class="bi bi-plus-lg me-1"></i>Nuevo Perfil
                </button>
            </div>

            <table class="table table-hover mb-0">
                <thead>
                    <tr><th>Perfil</th><th>Opciones</th><th>Usuarios</th><th width="120">Acciones</th></tr>
                </thead>
                <tbody id="tablaPerfiles">
                    <tr><td colspan="4" class="text-center text-muted">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal fade" id="modalPerfil" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="modalTitulo">Nuevo Perfil</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="modalError" class="alert alert-danger d-none"></div>
                    <form id="formPerfil">
                        <input type="hidden" id="inputId" value="">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre del perfil</label>
                            <input type="text" id="inputNombre" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Opciones de acceso</label>
                            <div id="opcionesContainer">
                                <p class="text-muted">Cargando opciones...</p>
                            </div>
                        </div>
                        <div class="d-flex gap-2 justify-content-end">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary" id="btnGuardar">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/modals.js"></script>
    <script>
        const API_URL = '/api';
        const modal = new bootstrap.Modal(document.getElementById('modalPerfil'));
        let perfiles = [];
        let opciones = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await cargarOpciones();
            await cargarPerfiles();
        });

        async function cargarOpciones() {
            try {
                const response = await fetchAuth(`${API_URL}/opciones`);
                if (!response) return;
                opciones = await response.json();
            } catch (error) {
                console.error('Error al cargar opciones:', error);
            }
        }

        async function cargarPerfiles() {
            try {
                const response = await fetchAuth(`${API_URL}/perfiles`);
                if (!response) return;
                
                perfiles = await response.json();
                mostrarPerfiles();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('tablaPerfiles').innerHTML = '<tr><td colspan="4" class="text-center text-danger">Error al cargar perfiles</td></tr>';
            }
        }

        function mostrarPerfiles() {
            const tbody = document.getElementById('tablaPerfiles');
            if (perfiles.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No hay perfiles registrados</td></tr>';
                return;
            }
            
            tbody.innerHTML = perfiles.map(p => `
                <tr id="fila-${p._id}">
                    <td>${escapeHtml(p.nombre)}</td>
                    <td><span class="badge bg-primary">${p.opciones ? p.opciones.length : 0}</span></td>
                    <td><span class="badge bg-secondary">0</span></td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick="abrirModal('${p._id}', '${escapeHtml(p.nombre)}')">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="eliminar('${p._id}')">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function abrirModal(id = '', nombre = '') {
            document.getElementById('modalTitulo').textContent = id ? 'Editar Perfil' : 'Nuevo Perfil';
            document.getElementById('inputId').value = id;
            document.getElementById('inputNombre').value = nombre;
            document.getElementById('modalError').classList.add('d-none');
            document.getElementById('btnGuardar').textContent = id ? 'Actualizar' : 'Guardar';

            // Mostrar opciones disponibles
            const container = document.getElementById('opcionesContainer');
            container.innerHTML = opciones.map(op => `
                <div class="form-check">
                    <input class="form-check-input opcion-check" type="checkbox" 
                           value="${op._id}" id="op${op._id}">
                    <label class="form-check-label" for="op${op._id}">
                        <i class="bi ${op.icono || 'bi-circle'} me-1"></i>
                        ${escapeHtml(op.nombre)}
                    </label>
                </div>
            `).join('');

            // Si es edición, cargar opciones asignadas
            if (id) {
                try {
                    const response = await fetchAuth(`${API_URL}/perfiles/${id}`);
                    if (response && response.ok) {
                        const perfil = await response.json();
                        if (perfil.opciones) {
                            perfil.opciones.forEach(idOp => {
                                const checkbox = document.getElementById('op' + idOp);
                                if (checkbox) checkbox.checked = true;
                            });
                        }
                    }
                } catch (error) {
                    console.error('Error al cargar opciones del perfil:', error);
                }
            }

            modal.show();
            setTimeout(() => document.getElementById('inputNombre').focus(), 300);
        }

        document.getElementById('formPerfil').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnGuardar');
            btn.disabled = true;
            
            const id = document.getElementById('inputId').value;
            const nombre = document.getElementById('inputNombre').value.trim();
            
            // Obtener opciones seleccionadas
            const opcionesSeleccionadas = Array.from(document.querySelectorAll('.opcion-check:checked'))
                .map(cb => cb.value);
            
            try {
                const url = id ? `${API_URL}/perfiles/${id}` : `${API_URL}/perfiles`;
                const method = id ? 'PUT' : 'POST';
                
                const response = await fetchAuth(url, {
                    method,
                    body: JSON.stringify({ nombre, opciones: opcionesSeleccionadas })
                });
                
                if (!response) {
                    btn.disabled = false;
                    return;
                }
                
                if (response.ok) {
                    modal.hide();
                    cargarPerfiles();
                } else {
                    const data = await response.json();
                    const err = document.getElementById('modalError');
                    err.textContent = data.error || 'Error al guardar';
                    err.classList.remove('d-none');
                }
            } catch (error) {
                console.error('Error:', error);
                const err = document.getElementById('modalError');
                err.textContent = 'Error al guardar';
                err.classList.remove('d-none');
            }
            
            btn.disabled = false;
        });

        async function eliminar(id) {
            if (!await confirmar('¿Eliminar este perfil?', 'Confirmar eliminación')) return;
            
            try {
                const response = await fetchAuth(`${API_URL}/perfiles/${id}`, {
                    method: 'DELETE'
                });
                
                if (!response) return;
                
                if (response.ok) {
                    cargarPerfiles();
                } else {
                    const data = await response.json();
                    await alerta(data.error || 'Error al eliminar', 'Error');
                }
            } catch (error) {
                console.error('Error:', error);
                await alerta('Error al eliminar', 'Error');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
