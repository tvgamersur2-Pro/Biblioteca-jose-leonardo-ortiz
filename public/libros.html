<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestión de Libros - Biblioteca Escolar José Leonardo Ortiz</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="/imagenes/logocole.jpeg">
    <link rel="shortcut icon" type="image/jpeg" href="/imagenes/logocole.jpeg">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/admin.css" rel="stylesheet">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar"></div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="topbar">
            <h4>Libros</h4>
            <div class="user-badge">
                <i class="bi bi-person-circle"></i>
                <span id="nombreUsuario">Usuario</span>
            </div>
        </div>

        <div class="card-section">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="mb-0"><i class="bi bi-book me-2"></i>Listado de Libros</h6>
                <div class="d-flex gap-2">
                    <div class="btn-group" role="group">
                        <button type="button" class="btn btn-outline-secondary btn-sm" id="btnVistaTabla" onclick="cambiarVista('tabla')" title="Vista Tabla">
                            <i class="bi bi-list-ul"></i>
                        </button>
                        <button type="button" class="btn btn-outline-secondary btn-sm" id="btnVistaGrid" onclick="cambiarVista('grid')" title="Vista Tarjetas">
                            <i class="bi bi-grid-3x3-gap"></i>
                        </button>
                    </div>
                    <button class="btn btn-primary btn-sm" onclick="abrirModal()">
                        <i class="bi bi-plus-lg me-1"></i>Nuevo Libro
                    </button>
                </div>
            </div>

            <div class="search-box">
                <input class="form-control" type="search" id="inputBuscar" placeholder="Buscar por título, código o autor...">
                <button class="btn btn-outline-primary" onclick="buscarLibros()">
                    <i class="bi bi-search"></i> Buscar
                </button>
            </div>

            <div id="tablaLibros">
                <div class="loading">
                    <i class="bi bi-hourglass-split"></i>
                    <p>Cargando libros...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal fade" id="modalLibro" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitulo">Nuevo Libro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="modalError" class="alert alert-danger d-none"></div>
                    <form id="formLibro">
                        <input type="hidden" id="inputId" value="">
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label fw-semibold">Título</label>
                                <input type="text" id="inputTitulo" class="form-control" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Código</label>
                                <input type="text" id="inputCodigo" class="form-control" required>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Autor</label>
                                <div class="input-group">
                                    <select id="inputAutor" class="form-select" required>
                                        <option value="">Selecciona un autor</option>
                                    </select>
                                    <button class="btn btn-outline-primary" type="button" onclick="abrirModalNuevoAutor()">
                                        <i class="bi bi-plus-lg"></i> Nuevo
                                    </button>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Categoría</label>
                                <select id="inputCategoria" class="form-select" required>
                                    <option value="">Cargando...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Estante</label>
                                <select id="inputEstante" class="form-select" required>
                                    <option value="">Cargando...</option>
                                </select>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Portada del libro</label>
                                <div class="d-flex gap-2 mb-2">
                                    <button type="button" class="btn btn-outline-primary flex-fill" onclick="abrirCamara()">
                                        <i class="bi bi-camera me-1"></i>Tomar Foto
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary flex-fill" onclick="document.getElementById('inputPortada').click()">
                                        <i class="bi bi-upload me-1"></i>Subir Archivo
                                    </button>
                                </div>
                                <input type="file" id="inputPortada" class="d-none" accept="image/*">
                                <small class="text-muted">Opcional. Formatos: JPG, PNG, GIF (máx. 5MB)</small>
                                
                                <!-- Preview de la imagen -->
                                <div id="previewPortada" class="mt-3"></div>
                                
                                <!-- Video de la cámara (oculto por defecto) -->
                                <div id="camaraContainer" class="mt-3 d-none">
                                    <video id="video" width="100%" autoplay style="border-radius: 8px; max-height: 400px;"></video>
                                    <div class="d-flex gap-2 mt-2">
                                        <button type="button" class="btn btn-success flex-fill" onclick="capturarFoto()">
                                            <i class="bi bi-camera-fill me-1"></i>Capturar
                                        </button>
                                        <button type="button" class="btn btn-secondary flex-fill" onclick="cerrarCamara()">
                                            <i class="bi bi-x-lg me-1"></i>Cancelar
                                        </button>
                                    </div>
                                </div>
                                <canvas id="canvas" class="d-none"></canvas>
                            </div>
                        </div>
                        <div class="d-flex gap-2 justify-content-end mt-3">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary" id="btnGuardar">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL NUEVO AUTOR -->
    <div class="modal fade" id="modalNuevoAutor" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Agregar Nuevo Autor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="modalAutorError" class="alert alert-danger d-none"></div>
                    <form id="formNuevoAutor">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre del autor</label>
                            <input type="text" id="inputNuevoAutor" class="form-control" required>
                        </div>
                        <div class="d-flex gap-2 justify-content-end">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary" id="btnGuardarAutor">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/modals.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/libros.js"></script>
</body>
</html>
