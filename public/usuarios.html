<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Usuarios - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/admin.css" rel="stylesheet">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar"></div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="topbar">
            <h4>Usuarios</h4>
            <div class="user-badge">
                <i class="bi bi-person-circle"></i>
                <span id="nombreUsuario">Usuario</span>
            </div>
        </div>

        <div class="card-section">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="mb-0"><i class="bi bi-people me-2"></i>Listado de Usuarios</h6>
                <button class="btn btn-primary btn-sm" onclick="abrirModal()">
                    <i class="bi bi-plus-lg me-1"></i>Nuevo Usuario
                </button>
            </div>

            <table class="table table-hover mb-0">
                <thead>
                    <tr><th>Usuario</th><th>Email</th><th>Perfil</th><th width="120">Acciones</th></tr>
                </thead>
                <tbody id="tablaUsuarios">
                    <tr><td colspan="4" class="text-center text-muted">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal fade" id="modalUsuario" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="modalTitulo">Nuevo Usuario</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="modalError" class="alert alert-danger d-none"></div>
                    <form id="formUsuario">
                        <input type="hidden" id="inputId" value="">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Usuario</label>
                            <input type="text" id="inputUsername" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" id="inputEmail" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Contraseña <small class="text-muted" id="passHint"></small></label>
                            <input type="password" id="inputPassword" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Perfil</label>
                            <select id="inputPerfil" class="form-select">
                                <option value="">-- Sin perfil --</option>
                            </select>
                        </div>
                        <div class="d-flex gap-2 justify-content-end">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary" id="btnGuardar">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/modals.js"></script>
    <script>
        const API_URL = '/api';
        const modal = new bootstrap.Modal(document.getElementById('modalUsuario'));
        let usuarios = [];
        let perfiles = [];
        let usuarioActualId = '';

        document.addEventListener('DOMContentLoaded', async () => {
            const auth = verificarAutenticacion();
            if (auth) {
                usuarioActualId = auth.usuario._id || auth.usuario.id;
            }
            await cargarPerfiles();
            await cargarUsuarios();
        });

        async function cargarPerfiles() {
            try {
                const response = await fetchAuth(`${API_URL}/perfiles`);
                if (!response) return;
                perfiles = await response.json();
                
                const select = document.getElementById('inputPerfil');
                select.innerHTML = '<option value="">-- Sin perfil --</option>' +
                    perfiles.map(p => `<option value="${p._id}">${escapeHtml(p.nombre)}</option>`).join('');
            } catch (error) {
                console.error('Error al cargar perfiles:', error);
            }
        }

        async function cargarUsuarios() {
            try {
                const response = await fetchAuth(`${API_URL}/usuarios`);
                if (!response) return;
                
                usuarios = await response.json();
                mostrarUsuarios();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('tablaUsuarios').innerHTML = '<tr><td colspan="4" class="text-center text-danger">Error al cargar usuarios</td></tr>';
            }
        }

        function mostrarUsuarios() {
            const tbody = document.getElementById('tablaUsuarios');
            if (usuarios.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No hay usuarios registrados</td></tr>';
                return;
            }
            
            tbody.innerHTML = usuarios.map(u => `
                <tr id="fila-${u._id}">
                    <td><i class="bi bi-person-circle me-2 text-muted"></i>${escapeHtml(u.usuario)}</td>
                    <td>${escapeHtml(u.email || '—')}</td>
                    <td><span class="badge bg-primary">${escapeHtml(u.perfil || 'Sin perfil')}</span></td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick="abrirModal('${u._id}', '${escapeHtml(u.usuario)}', '${escapeHtml(u.email || '')}', '${u.id_perfil || ''}')">
                            <i class="bi bi-pencil"></i>
                        </button>
                        ${u._id !== usuarioActualId ? `
                        <button class="btn btn-sm btn-danger" onclick="eliminar('${u._id}')">
                            <i class="bi bi-trash"></i>
                        </button>
                        ` : ''}
                    </td>
                </tr>
            `).join('');
        }

        function abrirModal(id = '', username = '', email = '', idPerfil = '') {
            document.getElementById('modalTitulo').textContent = id ? 'Editar Usuario' : 'Nuevo Usuario';
            document.getElementById('inputId').value = id;
            document.getElementById('inputUsername').value = username;
            document.getElementById('inputEmail').value = email;
            document.getElementById('inputPassword').value = '';
            document.getElementById('inputPerfil').value = idPerfil;
            document.getElementById('passHint').textContent = id ? '(dejar vacío para no cambiar)' : '';
            document.getElementById('modalError').classList.add('d-none');
            document.getElementById('btnGuardar').textContent = id ? 'Actualizar' : 'Guardar';
            modal.show();
            setTimeout(() => document.getElementById('inputUsername').focus(), 300);
        }

        document.getElementById('formUsuario').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnGuardar');
            btn.disabled = true;
            
            const id = document.getElementById('inputId').value;
            const usuario = document.getElementById('inputUsername').value.trim();
            const email = document.getElementById('inputEmail').value.trim();
            const password = document.getElementById('inputPassword').value;
            const id_perfil = document.getElementById('inputPerfil').value;
            
            if (!id && !password) {
                const err = document.getElementById('modalError');
                err.textContent = 'La contraseña es obligatoria para nuevos usuarios';
                err.classList.remove('d-none');
                btn.disabled = false;
                return;
            }
            
            try {
                const url = id ? `${API_URL}/usuarios/${id}` : `${API_URL}/usuarios`;
                const method = id ? 'PUT' : 'POST';
                
                const body = { usuario, email, id_perfil };
                if (password) body.clave = password;
                
                const response = await fetchAuth(url, {
                    method,
                    body: JSON.stringify(body)
                });
                
                if (!response) {
                    btn.disabled = false;
                    return;
                }
                
                if (response.ok) {
                    modal.hide();
                    cargarUsuarios();
                } else {
                    const data = await response.json();
                    const err = document.getElementById('modalError');
                    err.textContent = data.error || 'Error al guardar';
                    err.classList.remove('d-none');
                }
            } catch (error) {
                console.error('Error:', error);
                const err = document.getElementById('modalError');
                err.textContent = 'Error al guardar';
                err.classList.remove('d-none');
            }
            
            btn.disabled = false;
        });

        async function eliminar(id) {
            if (!await confirmar('¿Eliminar este usuario?', 'Confirmar eliminación')) return;
            
            try {
                const response = await fetchAuth(`${API_URL}/usuarios/${id}`, {
                    method: 'DELETE'
                });
                
                if (!response) return;
                
                if (response.ok) {
                    cargarUsuarios();
                } else {
                    const data = await response.json();
                    await alerta(data.error || 'Error al eliminar', 'Error');
                }
            } catch (error) {
                console.error('Error:', error);
                await alerta('Error al eliminar', 'Error');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
