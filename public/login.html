<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar Sesión - Biblioteca Escolar José Leonardo Ortiz</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="/imagenes/logocole.jpeg">
    <link rel="shortcut icon" type="image/jpeg" href="/imagenes/logocole.jpeg">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a3a5c 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            max-width: 400px;
            width: 100%;
        }
        .login-header {
            background: #1a3a5c;
            color: white;
            padding: 30px;
            text-align: center;
        }
        .login-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            border-radius: 50%;
            border: 3px solid white;
        }
        .login-body {
            padding: 30px;
        }
        .btn-primary {
            background: #e8a020;
            border: none;
            padding: 12px;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: #cf8c18;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #1a3a5c;
            text-decoration: none;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <img src="/imagenes/inisiar_sesion.jpg" alt="Login" class="login-icon">
            <h4 class="mb-0">Iniciar Sesión</h4>
            <small>Sistema de Biblioteca</small>
        </div>
        <div class="login-body">
            <div id="alertError" class="alert alert-danger d-none"></div>
            
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Usuario o Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" id="usuario" class="form-control" required autofocus>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" id="clave" class="form-control" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="btnLogin">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                </button>
            </form>
            
            <div class="back-link">
                <a href="/"><i class="bi bi-arrow-left me-1"></i>Volver al inicio</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
